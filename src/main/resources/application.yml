spring:
  application:
    name: blog-planet
  datasource:
    url: jdbc:h2:file:./data/blog-planet;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

blog-planet:
  feed:
    polling-interval: 30m
    connect-timeout: 3s
    read-timeout: 5s
  sample-data:
    enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
